name: Daglig filtertest

on:
  schedule:
    - cron: '0 7 * * *'  # 07:00 UTC = 09:00 svensk tid (UTC+2)
  workflow_dispatch:       # Tillåt manuell körning

jobs:
  filtertest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Sätt upp Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Kör filtertest
        id: test
        run: |
          python3 scripts/filtertest.py > testresultat.txt 2>&1
          cat testresultat.txt
          exit_code=$?
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          exit $exit_code

      - name: Skicka e-post vid fel
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: "🚨 Filtertest MISSLYCKADES – livsforsakringar.se"
          to: victorvoong06@gmail.com
          from: "livsforsakringar.se Test"
          body: |
            Ett eller flera filtertester misslyckades idag.

            Se fullständig rapport här:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
